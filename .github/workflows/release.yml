name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd frontend && npm ci && npm run build
      - run: go test ./...
      - run: go build -o dcp-linux-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: binary
          path: dcp-linux-amd64

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binary
      - run: sha256sum dcp-linux-amd64 > dcp-linux-amd64.sha256
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dcp-linux-amd64
            dcp-linux-amd64.sha256
          generate_release_notes: true
